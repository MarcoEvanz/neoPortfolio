<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<style>body{margin:0;overflow:hidden;background:#000}#game{width:100%;height:100vh}</style>
</head><body>
<div id="game"></div>
<script>
  const params = new URLSearchParams(window.location.search);
  EJS_player = '#game';
  EJS_core = params.get('core') || 'gba';
  EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
  EJS_gameUrl = decodeURIComponent(params.get('rom') || '');
  EJS_gameName = decodeURIComponent(params.get('name') || 'Game');
  EJS_startOnLoaded = true;
  EJS_color = params.get('color') || '#6366f1';
  EJS_backgroundColor = '#0a0f1a';
</script>
<script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body></html>
